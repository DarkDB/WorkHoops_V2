<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f1a"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Basketball icon -->
  <!-- Main circle -->
  <circle cx="140" cy="200" r="70" fill="none" stroke="#FF6B1A" stroke-width="5"/>
  <circle cx="140" cy="200" r="70" fill="#FF6B1A" fill-opacity="0.15"/>
  <!-- Horizontal line -->
  <path d="M 72 200 Q 140 170 208 200" fill="none" stroke="#FF6B1A" stroke-width="4"/>
  <path d="M 72 200 Q 140 230 208 200" fill="none" stroke="#FF6B1A" stroke-width="4"/>
  <!-- Vertical line -->
  <line x1="140" y1="130" x2="140" y2="270" stroke="#FF6B1A" stroke-width="4"/>

  <!-- WorkHoops title -->
  <text x="230" y="230" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="#FF6B1A" letter-spacing="-2">WorkHoops</text>

  <!-- Subtitle -->
  <text x="100" y="320" font-family="Arial, sans-serif" font-size="30" font-weight="400" fill="#ffffff" opacity="0.85">La plataforma de baloncesto para jugadores, entrenadores y clubes</text>

  <!-- Divider line -->
  <line x1="100" y1="370" x2="1100" y2="370" stroke="#FF6B1A" stroke-width="1.5" opacity="0.3"/>

  <!-- Bottom tagline -->
  <text x="100" y="430" font-family="Arial, sans-serif" font-size="22" fill="#aaaacc" opacity="0.7">Organiza partidos · Gestiona equipos · Conecta con tu comunidad</text>

  <!-- URL bottom right -->
  <text x="1090" y="590" font-family="Arial, sans-serif" font-size="22" fill="#aaaacc" opacity="0.6" text-anchor="end">workhoops.com</text>

  <!-- Decorative dots -->
  <circle cx="1080" cy="120" r="4" fill="#FF6B1A" opacity="0.4"/>
  <circle cx="1100" cy="140" r="2.5" fill="#FF6B1A" opacity="0.3"/>
  <circle cx="1060" cy="145" r="3" fill="#FF6B1A" opacity="0.25"/>
</svg>
