<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkHoops — Email Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; font-family: system-ui, sans-serif; padding: 20px; }
  h1 { color: #FF6B1A; font-size: 24px; margin-bottom: 8px; }
  p.subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .tab { background: #2a2a3e; color: #ccc; border: 1px solid #444; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .tab:hover { background: #FF6B1A; color: white; border-color: #FF6B1A; }
  .tab.active { background: #FF6B1A; color: white; border-color: #FF6B1A; }
  .preview-frame { width: 100%; max-width: 700px; margin: 0 auto; display: none; }
  .preview-frame.active { display: block; }
  .email-meta { background: #2a2a3e; border-radius: 8px 8px 0 0; padding: 12px 16px; border: 1px solid #444; border-bottom: none; }
  .email-meta span { color: #888; font-size: 12px; }
  .email-meta strong { color: #eee; font-size: 13px; }
  iframe { width: 100%; height: 700px; border: 1px solid #444; border-radius: 0 0 8px 8px; background: white; }
</style>
</head>
<body>
<h1>🏀 WorkHoops — Email Preview</h1>
<p class="subtitle">Vista previa de todos los emails de la plataforma</p>
<div class="tabs" id="tabs"></div>
<div id="frames"></div>
<script>
const emails = [
  { id: 'welcome-jugador', label: '👤 Welcome Jugador', subject: '¡Bienvenido a WorkHoops! 🏀', to: 'jugador@ejemplo.com', file: 'welcome-jugador.html' },
  { id: 'welcome-entrenador', label: '📋 Welcome Entrenador', subject: '¡Bienvenido a WorkHoops! 🏀', to: 'entrenador@ejemplo.com', file: 'welcome-entrenador.html' },
  { id: 'welcome-club', label: '🏟️ Welcome Club', subject: '¡Bienvenido a WorkHoops! 🏀', to: 'club@ejemplo.com', file: 'welcome-club.html' },
  { id: 'app-recibida', label: '📬 Candidatura recibida', subject: 'Carlos García ha aplicado a tu oferta', to: 'club@ejemplo.com', file: 'app-recibida.html' },
  { id: 'app-aceptada', label: '✅ Aplicación aceptada', subject: '¡Tu aplicación ha sido aceptada!', to: 'jugador@ejemplo.com', file: 'app-aceptada.html' },
  { id: 'app-rechazada', label: '❌ Aplicación rechazada', subject: 'Actualización de tu candidatura', to: 'jugador@ejemplo.com', file: 'app-rechazada.html' },
  { id: 'app-vista', label: '👁️ Aplicación vista', subject: 'El club ha revisado tu perfil', to: 'jugador@ejemplo.com', file: 'app-vista.html' },
  { id: 'pago', label: '💳 Pago confirmado', subject: '¡Pago confirmado! 🎉', to: 'club@ejemplo.com', file: 'pago.html' },
  { id: 'perfil', label: '🎯 Perfil completado', subject: '¡Tu perfil está listo!', to: 'jugador@ejemplo.com', file: 'perfil.html' },
];

const tabs = document.getElementById('tabs');
const frames = document.getElementById('frames');

emails.forEach((e, i) => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = e.label;
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.preview-frame').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('frame-' + e.id).classList.add('active');
  };
  tabs.appendChild(tab);

  const div = document.createElement('div');
  div.className = 'preview-frame' + (i === 0 ? ' active' : '');
  div.id = 'frame-' + e.id;
  div.innerHTML = `
    <div class="email-meta">
      <div><span>Para: </span><strong>${e.to}</strong></div>
      <div><span>Asunto: </span><strong>${e.subject}</strong></div>
    </div>
    <iframe src="${e.file}" title="${e.label}"></iframe>
  `;
  frames.appendChild(div);
});
</script>
</body>
</html>
